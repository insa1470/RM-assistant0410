name = "rm-assistant-api"
main = "worker/index.js"
compatibility_date = "2024-01-01"

# ⚠️ 填入你的 Cloudflare Account ID（Dashboard 右側邊欄可找到）
account_id = "0ab1f1f1444512b30bee083f31ab8443"

[[d1_databases]]
binding = "DB"
database_name = "rm-assistant-db"
# ⚠️ 執行 `npx wrangler d1 create rm-assistant-db` 後填入
database_id = "65b8196b-a1b5-4507-b77f-056179809023"

[vars]
# ADMIN_PASSWORD 已設為 secret，請勿在此填入（wrangler secret put ADMIN_PASSWORD）
# GEMINI_API_KEY 已設為 secret，請勿在此填入
