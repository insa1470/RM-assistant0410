<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RM 助手 — 管理後台</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root { --brand:#007d50; --brand-light:rgba(0,125,80,0.10); }
body  { font-family:-apple-system,"Helvetica Neue",sans-serif; background:#F2F2F7; }
.card { background:#fff; border-radius:16px; box-shadow:0 1px 4px rgba(0,0,0,0.08); }
.stat-box { background:#fff; border-radius:14px; padding:16px; box-shadow:0 1px 4px rgba(0,0,0,0.07); }
.badge-report  { background:rgba(0,125,80,0.12);  color:#007d50; }
.badge-meeting { background:rgba(0,122,255,0.12); color:#007AFF; }
.badge-site    { background:rgba(255,149,0,0.12);  color:#FF9500; }
.badge { display:inline-flex; align-items:center; gap:4px; font-size:12px; font-weight:600; padding:3px 8px; border-radius:20px; }
.medal { display:inline-flex; align-items:center; gap:3px; font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; background:linear-gradient(135deg,#FFD700,#FFA500); color:#7a4800; }
.progress-bg { background:#E5E7EB; border-radius:99px; height:8px; overflow:hidden; }
.progress-fill { height:100%; border-radius:99px; transition:width 0.6s ease; }
input[type=number]::-webkit-inner-spin-button { opacity:1; }
</style>
</head>
<body class="min-h-screen">

<!-- ── 登入 ── -->
<div id="login-screen" class="min-h-screen flex items-center justify-center p-6">
  <div class="card p-8 w-full max-w-sm">
    <div class="flex flex-col items-center mb-8">
      <div class="w-16 h-16 rounded-2xl flex items-center justify-center mb-4" style="background:var(--brand-light)">
        <i data-lucide="shield-check" class="w-8 h-8" style="color:var(--brand)"></i>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">管理後台</h1>
      <p class="text-sm text-gray-400 mt-1">RM 隨行助手</p>
    </div>
    <div class="space-y-4">
      <div>
        <label class="text-sm font-medium text-gray-600 block mb-1.5">管理員密碼</label>
        <input id="password-input" type="password" placeholder="••••••••"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 text-[15px] outline-none focus:border-[color:var(--brand)] transition-colors"
          autocomplete="current-password" autocorrect="off" autocapitalize="off" spellcheck="false"
          onkeydown="if(event.key==='Enter') login()">
      </div>
      <p id="login-error" class="text-red-500 text-sm hidden">密碼錯誤，請再試一次</p>
      <button onclick="login()" class="w-full py-3.5 rounded-xl font-semibold text-white text-[16px] active:opacity-80" style="background:var(--brand)">
        進入後台
      </button>
    </div>
  </div>
</div>

<!-- ── 儀表板 ── -->
<div id="dashboard" class="hidden max-w-5xl mx-auto px-4 py-8 space-y-6">

  <!-- Header -->
  <div class="flex flex-wrap items-center gap-3 justify-between">
    <div class="flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-medium bg-white border border-gray-200 text-gray-600 active:opacity-70">
        <i data-lucide="chevron-left" class="w-4 h-4"></i> 返回主畫面
      </a>
      <div>
        <h1 class="text-xl font-bold text-gray-900">行銷動態分析</h1>
        <p id="header-since" class="text-xs text-gray-400 mt-0.5"></p>
      </div>
    </div>
    <div class="flex items-center gap-2 flex-wrap">
      <select id="range-select" onchange="onRangeChange()" class="px-3 py-2 rounded-xl border border-gray-200 text-sm bg-white outline-none">
        <option value="7">近 7 天</option>
        <option value="30" selected>近 30 天</option>
        <option value="90">近 90 天</option>
        <option value="365">近一年</option>
      </select>
      <select id="week-month-select" onchange="onWeekMonthChange()" class="px-3 py-2 rounded-xl border border-gray-200 text-sm bg-white outline-none">
        <option value="">── 週別 ──</option>
      </select>
      <select id="week-num-select" onchange="loadData()" disabled class="px-3 py-2 rounded-xl border border-gray-200 text-sm bg-white outline-none disabled:opacity-40">
        <option value="">第幾週</option>
        <option value="1">第一週</option>
        <option value="2">第二週</option>
        <option value="3">第三週</option>
        <option value="4">第四週</option>
        <option value="5">第五週</option>
      </select>
      <button onclick="exportCSV()" class="flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-medium bg-white border border-gray-200 text-gray-600">
        <i data-lucide="download" class="w-4 h-4"></i> 匯出 CSV
      </button>
      <button onclick="logout()" class="flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm text-gray-500 bg-white border border-gray-200">
        <i data-lucide="log-out" class="w-4 h-4"></i> 登出
      </button>
    </div>
  </div>

  <!-- 總覽數字 -->
  <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
    <div class="stat-box text-center">
      <p class="text-3xl font-bold" style="color:var(--brand)" id="stat-total">—</p>
      <p class="text-xs text-gray-400 mt-1" id="stat-total-label">行銷拜訪數</p>
    </div>
    <div class="stat-box text-center">
      <p class="text-3xl font-bold text-blue-500" id="stat-achieve">—</p>
      <p class="text-xs text-gray-400 mt-1" id="stat-achieve-label">週目標達成率</p>
    </div>
    <div class="stat-box text-center">
      <p class="text-3xl font-bold text-orange-500" id="stat-clients">—</p>
      <p class="text-xs text-gray-400 mt-1">新戶數</p>
    </div>
    <div class="stat-box text-center">
      <p class="text-3xl font-bold text-purple-500" id="stat-8e">—</p>
      <p class="text-xs text-gray-400 mt-1">8+E 拜訪佔比</p>
    </div>
    <div class="stat-box text-center">
      <p class="text-3xl font-bold text-rose-500" id="stat-hq">—</p>
      <p class="text-xs text-gray-400 mt-1">總行領導陪訪</p>
    </div>
  </div>

  <!-- 管理雷達 -->
  <div class="card overflow-hidden">
    <div class="px-5 py-4 border-b border-gray-100 flex items-center justify-between">
      <div>
        <h2 class="text-[15px] font-bold text-gray-800">📡 管理雷達</h2>
        <p class="text-xs text-gray-400 mt-0.5">綠色＝達到週目標 · 紅色＝未達目標 · 🏅 表現最佳</p>
      </div>
      <span id="avg-badge" class="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded-lg"></span>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-gray-50 text-gray-500 text-xs font-semibold uppercase tracking-wide">
            <th class="px-4 py-3 text-left">姓名</th>
            <th class="px-4 py-3 text-center">本期拜訪</th>
            <th class="px-4 py-3 text-center">動能</th>
            <th class="px-4 py-3 text-center">8+E 比率</th>
            <th class="px-4 py-3 text-center">業務多樣性</th>
            <th class="px-4 py-3 text-center">跟進頻率</th>
            <th class="px-4 py-3 text-center">月度目標</th>
            <th class="px-4 py-3 text-center">最後拜訪</th>
          </tr>
        </thead>
        <tbody id="radar-body"></tbody>
      </table>
    </div>
  </div>

  <!-- 圖表：每日趨勢 + 類型分佈 -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <div class="card p-5 md:col-span-2">
      <h2 class="text-[14px] font-semibold text-gray-700 mb-4">近 10 工作日拜訪趨勢</h2>
      <canvas id="chart-daily" height="110"></canvas>
    </div>
    <div class="card p-5">
      <h2 class="text-[14px] font-semibold text-gray-700 mb-4">活動類型</h2>
      <canvas id="chart-type" height="160"></canvas>
    </div>
  </div>

  <!-- 行銷目標設定 -->
  <div class="card p-5">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-[14px] font-bold text-gray-800">🎯 行銷目標設定</h2>
      <button onclick="saveTargets()" class="text-sm font-semibold px-4 py-1.5 rounded-xl text-white" style="background:var(--brand)">儲存</button>
    </div>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div>
        <label class="text-xs text-gray-500 font-medium block mb-1">行銷人員人數</label>
        <input id="target-rm-count" type="number" min="1" max="100" value="12"
          class="w-full px-3 py-2 rounded-xl border border-gray-200 text-[15px] outline-none focus:border-[color:var(--brand)]">
      </div>
      <div>
        <label class="text-xs text-gray-500 font-medium block mb-1">每週目標（次／人）</label>
        <input id="target-weekly" type="number" min="1" max="20" value="2"
          class="w-full px-3 py-2 rounded-xl border border-gray-200 text-[15px] outline-none focus:border-[color:var(--brand)]">
      </div>
      <div>
        <label class="text-xs text-gray-500 font-medium block mb-1">每月目標（自動計算）</label>
        <div id="monthly-auto" class="px-3 py-2 rounded-xl border border-gray-100 bg-gray-50 text-[15px] text-gray-400">8 次／人</div>
      </div>
      <div>
        <label class="text-xs text-gray-500 font-medium block mb-1">沉睡客戶（幾天未拜訪）</label>
        <input id="target-sleep" type="number" min="7" max="365" value="30"
          class="w-full px-3 py-2 rounded-xl border border-gray-200 text-[15px] outline-none focus:border-[color:var(--brand)]">
      </div>
    </div>
    <p id="target-saved" class="text-xs text-green-500 mt-2 hidden">✅ 已儲存</p>
  </div>


  <!-- 跟進提醒清單 -->
  <div class="card overflow-hidden">
    <div class="px-5 py-4 border-b border-gray-100 flex items-center justify-between">
      <h2 class="text-[14px] font-semibold text-gray-700">跟進提醒清單</h2>
      <span id="followup-summary" class="text-xs text-gray-400"></span>
    </div>
    <!-- 高頻 -->
    <div class="px-5 pt-4 pb-1">
      <div class="flex items-center gap-2 mb-2">
        <span style="width:8px;height:8px;border-radius:50%;background:#ef4444;display:inline-block;"></span>
        <span class="text-[12px] font-semibold text-gray-600">高頻追蹤（拜訪後 7 天）</span>
      </div>
      <div id="followup-high" class="divide-y divide-gray-100">載入中…</div>
    </div>
    <!-- 定期 -->
    <div class="px-5 pt-4 pb-4">
      <div class="flex items-center gap-2 mb-2">
        <span style="width:8px;height:8px;border-radius:50%;background:#3b82f6;display:inline-block;"></span>
        <span class="text-[12px] font-semibold text-gray-600">定期追蹤（拜訪後 1 個月）</span>
      </div>
      <div id="followup-regular" class="divide-y divide-gray-100">載入中…</div>
    </div>
  </div>

  <!-- 明細紀錄 -->
  <div class="card overflow-hidden">
    <div class="px-5 py-4 border-b border-gray-100 flex items-center justify-between">
      <h2 class="text-[14px] font-semibold text-gray-700">明細紀錄</h2>
      <select id="user-filter" onchange="loadRecords()" class="text-sm px-3 py-1.5 rounded-xl border border-gray-200 bg-white outline-none">
        <option value="">全部人員</option>
      </select>
    </div>
    <div id="records-body" class="divide-y divide-gray-100"></div>
    <div id="records-more" class="px-5 py-3 text-center hidden">
      <button onclick="loadMoreRecords()" class="text-sm font-medium" style="color:var(--brand)">載入更多</button>
    </div>
  </div>

</div><!-- /dashboard -->

<!-- ── 紀錄詳情 Modal ── -->
<div id="detail-modal" class="fixed inset-0 z-50 hidden" style="background:rgba(0,0,0,0.45);" onclick="if(event.target===this)hideDetail()">
  <div style="position:absolute;right:0;top:0;bottom:0;width:min(480px,100%);background:#fff;overflow-y:auto;box-shadow:-4px 0 24px rgba(0,0,0,0.12);">
    <div style="position:sticky;top:0;background:#fff;border-bottom:1px solid #e5e7eb;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;z-index:1;">
      <div>
        <p id="detail-title" style="font-size:16px;font-weight:700;color:#111;margin:0;"></p>
        <p id="detail-sub"   style="font-size:12px;color:#9ca3af;margin:4px 0 0;"></p>
      </div>
      <button onclick="hideDetail()" style="font-size:22px;color:#9ca3af;background:none;border:none;cursor:pointer;padding:4px 8px;">✕</button>
    </div>
    <div id="detail-body" style="padding:16px 20px;font-size:13px;line-height:1.7;color:#374151;"></div>
  </div>
</div>

<script>
const WORKER_URL = 'https://rm-api.deepmystic.net';
let PASSWORD = '';
let charts = {};
let _recordMap = {}; // id → record
let statsData = null;
let recordsOffset = 0;
const RECORDS_LIMIT = 30;
let recordsSeenKeys = new Set(); // 跨分頁去重

/* ── 登入 ── */
async function login() {
  const pwd = document.getElementById('password-input').value.trim();
  if (!pwd) return;
  try {
    const res = await fetch(`${WORKER_URL}/api/stats?password=${enc(pwd)}&range=30`);
    if (!res.ok) { showLoginError(); return; }
  } catch { showLoginError(); return; }

  PASSWORD = pwd;
  localStorage.setItem('rm_admin_pwd', pwd);
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  initWeekMonthSelect();
  try { await loadTargets(); } catch(e) { console.warn('loadTargets error', e); }
  try { await loadData();    } catch(e) { console.warn('loadData error', e); }
}

function showLoginError() {
  const e = document.getElementById('login-error');
  e.classList.remove('hidden');
  setTimeout(() => e.classList.add('hidden'), 4000);
}

function logout() {
  localStorage.removeItem('rm_admin_pwd');
  location.reload();
}

/* ── 目標設定 ── */
async function loadTargets() {
  try {
    const res  = await fetch(`${WORKER_URL}/api/targets?password=${enc(PASSWORD)}`);
    const data = await res.json();
    const weekly  = data.weekly_visits  || 2;
    const rmCount = data.rm_count       || 12;
    document.getElementById('target-weekly').value   = weekly;
    document.getElementById('target-rm-count').value = rmCount;
    document.getElementById('target-sleep').value    = data.sleep_days || 30;
    updateMonthlyAuto();
  } catch {}
}

function updateMonthlyAuto() {
  const weekly = parseInt(document.getElementById('target-weekly').value) || 2;
  document.getElementById('monthly-auto').textContent = `${weekly * 4} 次／人`;
}

async function saveTargets() {
  const weekly  = parseInt(document.getElementById('target-weekly').value)   || 2;
  const rmCount = parseInt(document.getElementById('target-rm-count').value) || 12;
  const sd      = parseInt(document.getElementById('target-sleep').value)    || 30;
  await fetch(`${WORKER_URL}/api/targets?password=${enc(PASSWORD)}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ monthly_visits: weekly * 4, sleep_days: sd, rm_count: rmCount, weekly_visits: weekly })
  });
  updateMonthlyAuto();
  const msg = document.getElementById('target-saved');
  msg.classList.remove('hidden');
  setTimeout(() => msg.classList.add('hidden'), 2000);
  await loadData();
}

/* ── 週別選單初始化 ── */
function initWeekMonthSelect() {
  const sel = document.getElementById('week-month-select');
  const now = new Date();
  for (let i = 0; i < 4; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const val = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const label = `${d.getFullYear()}年${d.getMonth()+1}月`;
    const opt = document.createElement('option');
    opt.value = val; opt.textContent = label;
    sel.appendChild(opt);
  }
}

function onRangeChange() {
  // 切換到「近N天」模式時清除週別
  document.getElementById('week-month-select').value = '';
  document.getElementById('week-num-select').value   = '';
  document.getElementById('week-num-select').disabled = true;
  loadData();
}

function onWeekMonthChange() {
  const hasMonth = !!document.getElementById('week-month-select').value;
  document.getElementById('week-num-select').disabled = !hasMonth;
  if (!hasMonth) {
    document.getElementById('week-num-select').value = '';
    loadData();
  }
}

// 計算自然週（週一到週日）的 from/to
function getWeekRange(yearMonth, weekNum) {
  const [y, m] = yearMonth.split('-').map(Number);
  const d1 = new Date(y, m - 1, 1);
  const dow = d1.getDay(); // 0=Sun
  // 找本月第一天所在週的週一
  const diffToMon = dow === 0 ? -6 : 1 - dow;
  const weekStart = new Date(y, m - 1, 1 + diffToMon + (weekNum - 1) * 7);
  const weekEnd   = new Date(weekStart);
  weekEnd.setDate(weekStart.getDate() + 6);
  const fmt = d => d.toISOString().split('T')[0];
  return { from: fmt(weekStart), to: fmt(weekEnd) };
}

/* ── 主資料載入 ── */
async function loadData() {
  const sleep      = document.getElementById('target-sleep').value || 30;
  const weekMonth  = document.getElementById('week-month-select')?.value || '';
  const weekNum    = parseInt(document.getElementById('week-num-select')?.value || '0');

  let url;
  let headerText;
  if (weekMonth && weekNum) {
    const { from, to } = getWeekRange(weekMonth, weekNum);
    url = `${WORKER_URL}/api/stats?password=${enc(PASSWORD)}&from=${from}&to=${to}&sleep=${sleep}`;
    headerText = `${weekMonth.replace('-','年')}月 第${weekNum}週（${from} ～ ${to}）`;
  } else {
    const range = document.getElementById('range-select').value;
    url = `${WORKER_URL}/api/stats?password=${enc(PASSWORD)}&range=${range}&sleep=${sleep}`;
    headerText = null;
  }

  const res = await fetch(url);
  statsData  = await res.json();

  document.getElementById('header-since').textContent =
    headerText || `${statsData.since} 至今`;

  const t = statsData.totals || {};
  const weekly  = parseInt(document.getElementById('target-weekly')?.value)   || 2;
  const rmCount = parseInt(document.getElementById('target-rm-count')?.value) || 12;

  // 計算週目標總量：依時間區間判斷週數
  let weekCount = 1;
  if (weekMonth && weekNum) {
    weekCount = 1; // 週別模式 = 1 週
  } else {
    const range = parseInt(document.getElementById('range-select').value) || 30;
    weekCount = Math.max(1, Math.round(range / 7));
  }
  const teamTarget = rmCount * weekly * weekCount;
  const achievePct = teamTarget > 0 ? Math.round((t.total || 0) / teamTarget * 100) : 0;

  document.getElementById('stat-total').textContent    = t.total   || 0;
  document.getElementById('stat-total-label').textContent = '行銷拜訪數';
  document.getElementById('stat-achieve').textContent  = achievePct + '%';
  document.getElementById('stat-achieve-label').textContent = `目標達成（${t.total||0}／${teamTarget}）`;
  document.getElementById('stat-achieve').style.color  = achievePct >= 100 ? '#16a34a' : achievePct >= 60 ? '#f59e0b' : '#ef4444';
  const newClientCount = (statsData.purposeBreakdown || []).find(p => p.purpose === '新户开发' || p.purpose === '新戶開發')?.count || 0;
  document.getElementById('stat-clients').textContent  = newClientCount;
  const e8pct = t.total > 0 ? Math.round((t.total_8e||0)*100/t.total) : 0;
  document.getElementById('stat-8e').textContent = e8pct + '%';
  document.getElementById('stat-hq').textContent = t.total_hq || 0;

  // 個人週目標
  const personalWeeklyTarget = weekly * weekCount;
  document.getElementById('avg-badge').textContent = `週目標 ${weekly} 次／人 · 行銷人員 ${rmCount} 人`;

  renderRadar(statsData.radar, statsData.lastVisit, personalWeeklyTarget);
  renderDailyChart(statsData.dailyTrend);
  renderTypeChart(statsData.typeBreakdown);
  populateUserFilter(statsData.lastVisit);

  recordsOffset = 0;
  loadRecords();
  loadFollowUpList();
}

/* ── 管理雷達 ── */
function renderRadar(radar, lastVisit, target) {
  const lastMap = Object.fromEntries((lastVisit||[]).map(r => [r.user_name, r.last_date]));
  const sorted  = [...(radar||[])].sort((a,b) => b.count - a.count);
  const topUser = sorted[0]?.user_name;

  const rows = sorted.map(r => {
    const isTop      = r.user_name === topUser;
    const metTarget  = r.count >= target;
    const countColor = metTarget ? 'color:#16a34a;font-weight:700' : 'color:#dc2626;font-weight:700';
    const momentum   = r.momentum > 0 ? `<span class="text-green-500">↑${r.momentum}</span>`
                     : r.momentum < 0 ? `<span class="text-red-400">↓${Math.abs(r.momentum)}</span>`
                     : `<span class="text-gray-300">—</span>`;
    const pct     = Math.min(100, Math.round(r.count / Math.max(target, 1) * 100));
    const barColor= pct >= 100 ? '#16a34a' : pct >= 60 ? '#f59e0b' : '#ef4444';
    const lastD   = lastMap[r.user_name] || '-';
    const daysSince = lastD !== '-' ? Math.floor((new Date() - new Date(lastD)) / 86400000) : 999;
    const lastTag = daysSince <= 3  ? `<span class="text-green-500 text-xs">${lastD}</span>`
                  : daysSince <= 14 ? `<span class="text-yellow-500 text-xs">${lastD}</span>`
                  :                   `<span class="text-red-400 text-xs">${lastD}</span>`;

      ? `<span class="text-red-400 font-semibold">高頻 ${r.high_freq}</span><span class="text-gray-300 mx-1">/</span><span class="text-yellow-500 font-semibold">定期 ${r.regular}</span>`
      : `<span class="text-gray-300">—</span>`;

    return `<tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">
      <td class="px-4 py-3 font-semibold text-gray-800 whitespace-nowrap">
        ${r.user_name}
        ${isTop ? '<span class="ml-1">🏅</span>' : ''}
      </td>
      <td class="px-4 py-3 text-center">
        <span style="${countColor}">${r.count}</span>
        <span class="text-xs text-gray-400 ml-1">／${target}</span>
      </td>
      <td class="px-4 py-3 text-center text-[13px]">${momentum}</td>

        <span class="${r.e8_ratio >= 30 ? 'text-green-600' : 'text-gray-500'} font-semibold">${r.e8_ratio}%</span>
        <span class="text-xs text-gray-300 ml-1">(${r.e8_count}次)</span>
      </td>
      <td class="px-4 py-3 text-center text-[13px] text-gray-600">${bizLabel}</td>
      <td class="px-4 py-3 text-center text-[12px]">${followLabel}</td>
      <td class="px-4 py-3 text-center">
        <span style="font-weight:700;color:${barColor}">${pct}%</span>
      </td>
      <td class="px-4 py-3 text-center">${lastTag}</td>
    </tr>`;
  }).join('');

  document.getElementById('radar-body').innerHTML = rows || '<tr><td colspan="8" class="px-4 py-8 text-center text-gray-400 text-sm">此區間無資料</td></tr>';
}

/* ── 圖表 ── */
function renderDailyChart(trend) {
  // 只取工作日（週一～週五），取最近 10 個工作日
  const workdays = (trend||[]).filter(r => {
    if (!r.visit_date) return false;
    const dow = new Date(r.visit_date).getDay(); // 0=日,6=六
    return dow !== 0 && dow !== 6;
  });
  const last10 = workdays.slice(-10);

  // 補齊：若不足 10 天，把最近 10 個工作日都列出來（無紀錄的補 0）
  const last10Dates = getLast10Workdays();
  const countMap = Object.fromEntries(last10.map(r => [r.visit_date, r.count]));
  const DOW = ['日','一','二','三','四','五','六'];
  const labels = last10Dates.map(d => `(${DOW[new Date(d).getDay()]})`);  // (一)(二)…
  const data   = last10Dates.map(d => countMap[d] || 0);

  redraw('chart-daily', 'line', {
    labels,
    datasets: [{ label:'拜訪', data,
      borderColor:'#007d50', backgroundColor:'rgba(0,125,80,0.08)',
      fill:true, tension:0.3, pointRadius:4, pointBackgroundColor:'#007d50' }]
  }, { plugins:{legend:{display:false}}, scales:{ y:{beginAtZero:true,ticks:{stepSize:1}}, x:{grid:{display:false}} } });
}

function getLast10Workdays() {
  const result = [];
  const d = new Date();
  while (result.length < 10) {
    const dow = d.getDay();
    if (dow !== 0 && dow !== 6) {
      result.unshift(d.toISOString().split('T')[0]);
    }
    d.setDate(d.getDate() - 1);
  }
  return result;
}

/* ── 跟進提醒清單 ── */
async function loadFollowUpList() {
  document.getElementById('followup-high').innerHTML    = '載入中…';
  document.getElementById('followup-regular').innerHTML = '載入中…';

  // 拉最多 500 筆 report，取每個客戶最新一筆有設跟進的
  const res  = await fetch(`${WORKER_URL}/api/records?password=${enc(PASSWORD)}&limit=500&offset=0`);
  const data = await res.json();
  const all  = (data.records || []).filter(r => r.type === 'report' && r.client_name &&
    (r.follow_up === '高頻追蹤' || r.follow_up === '強追蹤' || r.follow_up === '定期追蹤'));

  // 每個客戶只保留最新一筆（API 已按 visit_date DESC）
  const seen = new Set();
  const deduped = all.filter(r => {
    const key = r.client_name;
    if (seen.has(key)) return false;
    seen.add(key); return true;
  });

  const today = new Date().toISOString().split('T')[0];

  function diffDays(due) {
    return Math.round((new Date(due) - new Date(today)) / 86400000);
  }

  function rowHtml(r) {
    const due  = calcReminder(r.visit_date, r.follow_up);
    if (!due) return '';
    const diff = diffDays(due);
    let color, statusText;
    if (diff < 0)       { color = '#ef4444'; statusText = `請提醒 RM（已過 ${Math.abs(diff)} 天）`; }
    else if (diff === 0){ color = '#ef4444'; statusText = '今天提醒 RM'; }
    else if (diff <= 3) { color = '#f59e0b'; statusText = `還有 ${diff} 天提醒 RM`; }
    else                { color = '#6b7280'; statusText = `還有 ${diff} 天提醒 RM`; }
    return `
      <div style="padding:10px 0;border-top:0.5px solid #f3f4f6;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
          <p style="font-size:13px;font-weight:600;color:#1f2937;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.client_name}</p>
          <p style="font-size:12px;font-weight:700;color:${color};white-space:nowrap;margin:0;">${statusText}</p>
        </div>
        <p style="font-size:11px;color:#9ca3af;margin:3px 0 0;">
          ${r.user_name}　·　上次拜訪日：${r.visit_date||'-'}　·　提醒日：${due}
        </p>
      </div>`;
  }

  const highList = deduped
    .filter(r => r.follow_up === '高頻追蹤' || r.follow_up === '強追蹤')
    .sort((a, b) => {
      const da = calcReminder(a.visit_date, a.follow_up);
      const db = calcReminder(b.visit_date, b.follow_up);
      return da < db ? -1 : da > db ? 1 : 0;
    });

  const regList = deduped
    .filter(r => r.follow_up === '定期追蹤')
    .sort((a, b) => {
      const da = calcReminder(a.visit_date, a.follow_up);
      const db = calcReminder(b.visit_date, b.follow_up);
      return da < db ? -1 : da > db ? 1 : 0;
    });

  document.getElementById('followup-high').innerHTML =
    highList.length ? highList.map(rowHtml).join('') : '<p class="py-2 text-gray-400 text-xs not-italic">無高頻追蹤客戶</p>';
  document.getElementById('followup-regular').innerHTML =
    regList.length ? regList.map(rowHtml).join('') : '<p class="py-2 text-gray-400 text-xs not-italic">無定期追蹤客戶</p>';

  const overdueCount = [...highList, ...regList].filter(r => {
    const due = calcReminder(r.visit_date, r.follow_up);
    return due && diffDays(due) < 0;
  }).length;
  document.getElementById('followup-summary').textContent =
    `共 ${highList.length + regList.length} 位客戶${overdueCount > 0 ? ` · ${overdueCount} 位逾期` : ''}`;
}

/* ── 明細 ── */
const TYPE_LABEL = { report:'訪談', meeting:'會議', site:'現場' };
const TYPE_CLASS = { report:'badge-report', meeting:'badge-meeting', site:'badge-site' };

/* 提醒日計算 */
function calcReminder(visitDate, followUp) {
  if (!visitDate || !followUp) return null;
  const isHigh    = followUp === '高頻追蹤' || followUp === '強追蹤';
  const isRegular = followUp === '定期追蹤';
  if (!isHigh && !isRegular) return null;

  const base = new Date(visitDate);
  if (isHigh) {
    base.setDate(base.getDate() + 7);       // +7 日
  } else {
    base.setMonth(base.getMonth() + 1);     // +1 個月
  }
  return base.toISOString().split('T')[0];  // YYYY-MM-DD
}

function reminderBadge(visitDate, followUp) {
  const due = calcReminder(visitDate, followUp);
  if (!due) return '';
  const today = new Date().toISOString().split('T')[0];
  const diffDays = Math.round((new Date(due) - new Date(today)) / 86400000);
  const label  = followUp === '定期追蹤' ? '定期' : '高頻';
  let color, text;
  if (diffDays < 0)      { color = '#ef4444'; text = `${label} 逾期${Math.abs(diffDays)}天`; }
  else if (diffDays === 0){ color = '#ef4444'; text = `${label} 今天提醒`; }
  else if (diffDays <= 3) { color = '#f59e0b'; text = `${label} 還有${diffDays}天`; }
  else                    { color = '#9ca3af'; text = `${label} ${due}`; }
  return `<span style="font-size:10px;font-weight:600;color:${color};white-space:nowrap;">${text}</span>`;
}

async function loadRecords() { recordsOffset=0; recordsSeenKeys.clear(); document.getElementById('records-body').innerHTML=''; await fetchRecords(); }
async function loadMoreRecords() { await fetchRecords(); }
async function fetchRecords() {
  const user = document.getElementById('user-filter').value;
  let url = `${WORKER_URL}/api/records?password=${enc(PASSWORD)}&limit=${RECORDS_LIMIT}&offset=${recordsOffset}`;
  if (user) url += `&user=${enc(user)}`;
  const res  = await fetch(url);
  const data = await res.json();
  const allRows = (data.records || []).filter(r => r.type !== 'meeting');
  // 去重：同用戶 + 同客戶/會議 + 同日期 + 同類型，只保留第一筆（API 已按 created_at DESC，即最新）
  const rows = allRows.filter(r => {
    const key = `${r.user_name}|${r.type}|${r.client_name||r.meeting_name||''}|${r.visit_date||''}`;
    if (recordsSeenKeys.has(key)) return false;
    recordsSeenKeys.add(key);
    return true;
  });
  rows.forEach(r => { _recordMap[r.id] = r; });
  const html = rows.map(r => {
    const remind = reminderBadge(r.visit_date, r.follow_up);
    return `
    <div class="flex items-center gap-3 px-5 py-3 cursor-pointer active:bg-gray-50 hover:bg-gray-50 transition-colors" onclick="showDetail('${r.id}')">
      <span class="badge ${TYPE_CLASS[r.type]||'badge-report'} flex-shrink-0">${TYPE_LABEL[r.type]||r.type}</span>
      <div class="flex-1 min-w-0">
        <p class="text-[14px] font-semibold text-gray-800 truncate">${r.client_name||r.meeting_name||'—'}</p>
        <p class="text-[12px] text-gray-400">${r.user_name} · ${r.visit_date||'-'} · ${r.city||r.branch||'-'}${r.is_8_plus_e ? ' · <span style="color:#007d50;font-weight:600">8+E</span>' : ''}</p>
      </div>
      <div class="flex flex-col items-end gap-1 flex-shrink-0">
        ${remind}
        <span style="color:#d1d5db;font-size:16px;">›</span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('records-body').insertAdjacentHTML('beforeend', html || (recordsOffset===0 ? '<div class="px-5 py-8 text-center text-gray-400 text-sm">此區間無紀錄</div>' : ''));
  recordsOffset += rows.length;
  document.getElementById('records-more').classList.toggle('hidden', rows.length < RECORDS_LIMIT);
  lucide.createIcons();
}

/* ── 紀錄詳情 ── */
function showDetail(id) {
  const r = _recordMap[id];
  if (!r) return;
  const TYPE_FULL = { report:'访谈报告', meeting:'会议记录', site:'现场记录' };
  const tmpl = (() => { try { return r.tmpl_json ? JSON.parse(r.tmpl_json) : {}; } catch { return {}; } })();

  document.getElementById('detail-title').textContent = r.client_name || r.meeting_name || '—';
  document.getElementById('detail-sub').textContent =
    `${r.user_name} · ${TYPE_FULL[r.type]||r.type} · ${r.visit_date||'-'}`;

  const row = (label, val) => val
    ? `<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f3f4f6;">
         <span style="color:#6b7280;min-width:72px;flex-shrink:0;">${label}</span>
         <span style="color:#111;font-weight:500;">${val}</span>
       </div>`
    : '';
  const section = (title, content) =>
    `<div style="margin-top:14px;">
       <p style="font-size:11px;font-weight:700;color:#9ca3af;letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px;">${title}</p>
       ${content}
     </div>`;
  const block = (val) =>
    `<div style="background:#f9fafb;border-radius:8px;padding:10px 12px;color:#111;white-space:pre-wrap;line-height:1.7;">${val}</div>`;

  let html = '';

  // 基本資訊
  html += section('基本信息',
    row('负责人', r.owner) +
    row('RM组别', r.rm_group) +
    row('访谈目的', r.purpose) +
    row('地点', r.city || r.branch) +
    row('类型/8+E', r.company_type ? `${r.company_type}${r.is_8_plus_e?'（8+E）':''}` : (r.is_8_plus_e?'8+E':'')) +
    row('总行领导', r.hq_leader ? '是' : '') +
    row('参与人员', [r.customer_staff ? '顾客: '+r.customer_staff : '', r.bank_staff ? '我行: '+r.bank_staff : ''].filter(Boolean).join(' / '))
  );

  // 供应链 / 财务
  if (tmpl.group || tmpl.buyer || tmpl.supplier || tmpl.revenue) {
    // 金流圖（買方 ──金流──▶ 客戶 ──金流──▶ 供應商）
    const focalName = r.client_name || r.meeting_name || '—';
    const nodeStyle   = 'display:inline-block;background:#e8f5ee;border:1px solid #b7deca;border-radius:7px;padding:2px 9px;font-size:12px;color:#007d50;font-weight:600;white-space:nowrap;';
    const focalStyle  = 'display:inline-block;background:#007d50;border-radius:7px;padding:3px 10px;font-size:12px;color:#fff;font-weight:700;white-space:nowrap;';
    const arrowStyle  = 'font-size:12px;color:#9ca3af;margin:0 3px;white-space:nowrap;';
    const termsStyle  = 'display:block;font-size:10px;color:#9ca3af;text-align:center;margin-top:2px;';

    let graphHtml = '<div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;padding:10px 4px 6px;">';
    if (tmpl.buyer) {
      graphHtml += `<div style="display:flex;flex-direction:column;align-items:center;">
        <span style="${nodeStyle}">${tmpl.buyer}</span>
        ${tmpl.buyerTerms ? `<span style="${termsStyle}">收款 ${tmpl.buyerTerms}</span>` : ''}
      </div>`;
      graphHtml += `<span style="${arrowStyle}">──金流──▶</span>`;
    }
    graphHtml += `<div style="display:flex;flex-direction:column;align-items:center;">
      <span style="${focalStyle}">${focalName}</span>
      ${tmpl.group ? `<span style="${termsStyle}">${tmpl.group}集团</span>` : ''}
    </div>`;
    if (tmpl.supplier) {
      graphHtml += `<span style="${arrowStyle}">──金流──▶</span>`;
      graphHtml += `<div style="display:flex;flex-direction:column;align-items:center;">
        <span style="${nodeStyle}">${tmpl.supplier}</span>
        ${tmpl.supplierTerms ? `<span style="${termsStyle}">付款 ${tmpl.supplierTerms}</span>` : ''}
      </div>`;
    }
    graphHtml += '</div>';

    html += section('供应链 & 财务',
      graphHtml +
      row('年营收', tmpl.revenue) +
      row('毛利', tmpl.grossMargin) +
      row('员工人数', tmpl.headcount)
    );
  }

  // 現場紀錄 — 訪查內容（site 專用）
  if (r.type === 'site') {
    if (tmpl.mgmtTalk)     html += section('与公司高管面谈情形', block(tmpl.mgmtTalk));
    if (tmpl.factoryEnv)   html += section('访厂情况（产线及库存）', block(tmpl.factoryEnv));
    if (tmpl.businessPerf) html += section('最新接单与营收获利表现', block(tmpl.businessPerf));
    if (tmpl.summary)      html += section('综合评述', block(tmpl.summary));
  }

  // 完整访谈摘要（含第2点之后的 contentList）
  const summaryLines = [];
  if (tmpl.customerNeed) summaryLines.push(`1. ${tmpl.customerNeed}`);
  if (Array.isArray(tmpl.contentList)) {
    tmpl.contentList.filter(i => i && i.trim()).forEach((i, idx) => {
      summaryLines.push(`${idx + 2}. ${i}`);
    });
  }
  if (summaryLines.length) {
    html += section('访谈摘要', block(summaryLines.join('\n')));
  }

  // 待办与后续规划
  const todoLines = Array.isArray(tmpl.todoList)
    ? tmpl.todoList.filter(i => i && i.trim()).map((i, idx) => `${idx + 1}. ${i}`)
    : [];
  if (todoLines.length) {
    html += section('待办与后续规划', block(todoLines.join('\n')));
  }

  // 爭取業務
  const bizList = Array.isArray(tmpl.targetBusiness) ? tmpl.targetBusiness.filter(Boolean) : [];
  if (bizList.length) {
    html += section('争取业务', row('业务项目', bizList.join('、')));
  }

  // 跟进
  if (r.follow_up) {
    html += section('跟进状态', row('跟进', r.follow_up));
  }

  document.getElementById('detail-body').innerHTML = html;
  document.getElementById('detail-modal').classList.remove('hidden');
}
