<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RM 助手 — 管理後台</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root { --brand:#007d50; --brand-light:rgba(0,125,80,0.10); }
body  { font-family:-apple-system,"Helvetica Neue",sans-serif; background:#F2F2F7; }
.card { background:#fff; border-radius:16px; box-shadow:0 1px 4px rgba(0,0,0,0.08); }
.stat-box { background:#fff; border-radius:14px; padding:16px; box-shadow:0 1px 4px rgba(0,0,0,0.07); }
.badge-report  { background:rgba(0,125,80,0.12);  color:#007d50; }
.badge-meeting { background:rgba(0,122,255,0.12); color:#007AFF; }
.badge-site    { background:rgba(255,149,0,0.12);  color:#FF9500; }
.badge { display:inline-flex; align-items:center; gap:4px; font-size:12px; font-weight:600; padding:3px 8px; border-radius:20px; }
.medal { display:inline-flex; align-items:center; gap:3px; font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; background:linear-gradient(135deg,#FFD700,#FFA500); color:#7a4800; }
.progress-bg { background:#E5E7EB; border-radius:99px; height:8px; overflow:hidden; }
.progress-fill { height:100%; border-radius:99px; transition:width 0.6s ease; }
input[type=number]::-webkit-inner-spin-button { opacity:1; }
</style>
</head>
<body class="min-h-screen">

<!-- ── 登入 ── -->
<div id="login-screen" class="min-h-screen flex items-center justify-center p-6">
  <div class="card p-8 w-full max-w-sm">
    <div class="flex flex-col items-center mb-8">
      <div class="w-16 h-16 rounded-2xl flex items-center justify-center mb-4" style="background:var(--brand-light)">
        <i data-lucide="shield-check" class="w-8 h-8" style="color:var(--brand)"></i>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">管理後台</h1>
      <p class="text-sm text-gray-400 mt-1">RM 隨行助手</p>
    </div>
    <div class="space-y-4">
      <div>
        <label class="text-sm font-medium text-gray-600 block mb-1.5">管理員密碼</label>
        <input id="password-input" type="password" placeholder="••••••••"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 text-[15px] outline-none focus:border-[color:var(--brand)] transition-colors"
          autocomplete="current-password" autocorrect="off" autocapitalize="off" spellcheck="false"
          onkeydown="if(event.key==='Enter') login()">
      </div>
      <p id="login-error" class="text-red-500 text-sm hidden">密碼錯誤，請再試一次</p>
      <button onclick="login()" class="w-full py-3.5 rounded-xl font-semibold text-white text-[16px] active:opacity-80" style="background:var(--brand)">
        進入後台
      </button>
    </div>
  </div>
</div>

<!-- ── 儀表板 ── -->
<div id="dashboard" class="hidden max-w-5xl mx-auto px-4 py-8 space-y-6">

  <!-- Header -->
  <div class="flex flex-wrap items-center gap-3 justify-between">
    <div class="flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-medium bg-white border border-gray-200 text-gray-600 active:opacity-70">
        <i data-lucide="chevron-left" class="w-4 h-4"></i> 返回主畫面
      </a>
      <div>
        <h1 class="text-xl font-bold text-gray-900">行銷動態分析</h1>
        <p id="header-since" class="text-xs text-gray-400 mt-0.5"></p>
      </div>
    </div>
    <div class="flex items-center gap-2 flex-wrap">
      <select id="range-select" onchange="loadData()" class="px-3 py-2 rounded-xl border border-gray-200 text-sm bg-white outline-none">
        <option value="7">近 7 天</option>
        <option value="30" selected>近 30 天</option>
        <option value="90">近 90 天</option>
        <option value="365">近一年</option>
      </select>
      <button onclick="exportCSV()" class="flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-medium bg-white border border-gray-200 text-gray-600">
        <i data-lucide="download" class="w-4 h-4"></i> 匯出 CSV
      </button>
      <button onclick="logout()" class="flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm text-gray-500 bg-white border border-gray-200">
        <i data-lucide="log-out" class="w-4 h-4"></i> 登出
      </button>
    </div>
  </div>

  <!-- 總覽數字 -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
    <div class="stat-box text-center">
      <p class="text-3xl font-bold" style="color:var(--brand)" id="stat-total">—</p>
      <p class="text-xs text-gray-400 mt-1">總紀錄數</p>
    </div>
    <div class="stat-box text-center">
      <p class="text-3xl font-bold text-blue-500" id="stat-users">—</p>
      <p class="text-xs text-gray-400 mt-1">活躍用戶</p>
    </div>
    <div class="stat-box text-center">
      <p class="text-3xl font-bold text-orange-500" id="stat-clients">—</p>
      <p class="text-xs text-gray-400 mt-1">涵蓋客戶</p>
    </div>
    <div class="stat-box text-center">
      <p class="text-3xl font-bold text-purple-500" id="stat-8e">—</p>
      <p class="text-xs text-gray-400 mt-1">8+E 拜訪佔比</p>
    </div>
  </div>

  <!-- 管理雷達 -->
  <div class="card overflow-hidden">
    <div class="px-5 py-4 border-b border-gray-100 flex items-center justify-between">
      <div>
        <h2 class="text-[15px] font-bold text-gray-800">📡 管理雷達</h2>
        <p class="text-xs text-gray-400 mt-0.5">綠色＝高於全行平均 · 紅色＝低於平均 · 🏅 表現最佳</p>
      </div>
      <span id="avg-badge" class="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded-lg"></span>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-gray-50 text-gray-500 text-xs font-semibold uppercase tracking-wide">
            <th class="px-4 py-3 text-left">姓名</th>
            <th class="px-4 py-3 text-center">本期拜訪</th>
            <th class="px-4 py-3 text-center">動能</th>
            <th class="px-4 py-3 text-center">8+E 比率</th>
            <th class="px-4 py-3 text-center">客戶多樣性</th>
            <th class="px-4 py-3 text-center">月度目標</th>
            <th class="px-4 py-3 text-center">最後拜訪</th>
          </tr>
        </thead>
        <tbody id="radar-body"></tbody>
      </table>
    </div>
  </div>

  <!-- 圖表：每日趨勢 + 類型分佈 -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <div class="card p-5 md:col-span-2">
      <h2 class="text-[14px] font-semibold text-gray-700 mb-4">每日拜訪趨勢</h2>
      <canvas id="chart-daily" height="110"></canvas>
    </div>
    <div class="card p-5">
      <h2 class="text-[14px] font-semibold text-gray-700 mb-4">活動類型</h2>
      <canvas id="chart-type" height="160"></canvas>
    </div>
  </div>

  <!-- 月度目標設定 -->
  <div class="card p-5">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-[14px] font-bold text-gray-800">🎯 月度目標設定</h2>
      <button onclick="saveTargets()" class="text-sm font-semibold px-4 py-1.5 rounded-xl text-white" style="background:var(--brand)">儲存</button>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="text-xs text-gray-500 font-medium block mb-1">每月拜訪目標（次）</label>
        <input id="target-visits" type="number" min="1" max="200" value="20"
          class="w-full px-3 py-2 rounded-xl border border-gray-200 text-[15px] outline-none focus:border-[color:var(--brand)]">
      </div>
      <div>
        <label class="text-xs text-gray-500 font-medium block mb-1">沉睡客戶定義（幾天未拜訪）</label>
        <input id="target-sleep" type="number" min="7" max="365" value="30"
          class="w-full px-3 py-2 rounded-xl border border-gray-200 text-[15px] outline-none focus:border-[color:var(--brand)]">
      </div>
    </div>
    <p id="target-saved" class="text-xs text-green-500 mt-2 hidden">✅ 已儲存</p>
  </div>

  <!-- 沉睡客戶 -->
  <div class="card overflow-hidden">
    <div class="px-5 py-4 border-b border-gray-100 flex items-center justify-between">
      <h2 class="text-[14px] font-bold text-gray-800">💤 沉睡客戶警示</h2>
      <span id="sleep-count" class="text-xs text-gray-400"></span>
    </div>
    <div id="sleep-body" class="divide-y divide-gray-100"></div>
  </div>

  <!-- 拜訪目的 -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div class="card p-5">
      <h2 class="text-[14px] font-semibold text-gray-700 mb-4">拜訪目的分析</h2>
      <canvas id="chart-purpose" height="180"></canvas>
    </div>
    <div class="card p-5">
      <h2 class="text-[14px] font-semibold text-gray-700 mb-4">8+E 拜訪比率（各人）</h2>
      <canvas id="chart-8e" height="180"></canvas>
    </div>
  </div>

  <!-- 明細紀錄 -->
  <div class="card overflow-hidden">
    <div class="px-5 py-4 border-b border-gray-100 flex items-center justify-between">
      <h2 class="text-[14px] font-semibold text-gray-700">明細紀錄</h2>
      <select id="user-filter" onchange="loadRecords()" class="text-sm px-3 py-1.5 rounded-xl border border-gray-200 bg-white outline-none">
        <option value="">全部人員</option>
      </select>
    </div>
    <div id="records-body" class="divide-y divide-gray-100"></div>
    <div id="records-more" class="px-5 py-3 text-center hidden">
      <button onclick="loadMoreRecords()" class="text-sm font-medium" style="color:var(--brand)">載入更多</button>
    </div>
  </div>

</div><!-- /dashboard -->

<!-- ── 紀錄詳情 Modal ── -->
<div id="detail-modal" class="fixed inset-0 z-50 hidden" style="background:rgba(0,0,0,0.45);" onclick="if(event.target===this)hideDetail()">
  <div style="position:absolute;right:0;top:0;bottom:0;width:min(480px,100%);background:#fff;overflow-y:auto;box-shadow:-4px 0 24px rgba(0,0,0,0.12);">
    <div style="position:sticky;top:0;background:#fff;border-bottom:1px solid #e5e7eb;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;z-index:1;">
      <div>
        <p id="detail-title" style="font-size:16px;font-weight:700;color:#111;margin:0;"></p>
        <p id="detail-sub"   style="font-size:12px;color:#9ca3af;margin:4px 0 0;"></p>
      </div>
      <button onclick="hideDetail()" style="font-size:22px;color:#9ca3af;background:none;border:none;cursor:pointer;padding:4px 8px;">✕</button>
    </div>
    <div id="detail-body" style="padding:16px 20px;font-size:13px;line-height:1.7;color:#374151;"></div>
  </div>
</div>

<script>
const WORKER_URL = 'https://rm-api.deepmystic.net';
let PASSWORD = '';
let charts = {};
let _recordMap = {}; // id → record
let statsData = null;
let recordsOffset = 0;
const RECORDS_LIMIT = 30;
let recordsSeenKeys = new Set(); // 跨分頁去重

/* ── 登入 ── */
async function login() {
  const pwd = document.getElementById('password-input').value.trim();
  if (!pwd) return;
  try {
    const res = await fetch(`${WORKER_URL}/api/stats?password=${enc(pwd)}&range=30`);
    if (!res.ok) { showLoginError(); return; }
  } catch { showLoginError(); return; }

  PASSWORD = pwd;
  localStorage.setItem('rm_admin_pwd', pwd);
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  try { await loadTargets(); } catch(e) { console.warn('loadTargets error', e); }
  try { await loadData();    } catch(e) { console.warn('loadData error', e); }
}

function showLoginError() {
  const e = document.getElementById('login-error');
  e.classList.remove('hidden');
  setTimeout(() => e.classList.add('hidden'), 4000);
}

function logout() {
  localStorage.removeItem('rm_admin_pwd');
  location.reload();
}

/* ── 目標設定 ── */
async function loadTargets() {
  try {
    const res  = await fetch(`${WORKER_URL}/api/targets?password=${enc(PASSWORD)}`);
    const data = await res.json();
    document.getElementById('target-visits').value = data.monthly_visits || 20;
    document.getElementById('target-sleep').value  = data.sleep_days    || 30;
  } catch {}
}

async function saveTargets() {
  const mv = parseInt(document.getElementById('target-visits').value);
  const sd = parseInt(document.getElementById('target-sleep').value);
  await fetch(`${WORKER_URL}/api/targets?password=${enc(PASSWORD)}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ monthly_visits: mv, sleep_days: sd })
  });
  const msg = document.getElementById('target-saved');
  msg.classList.remove('hidden');
  setTimeout(() => msg.classList.add('hidden'), 2000);
  await loadData();
}

/* ── 主資料載入 ── */
async function loadData() {
  const range = document.getElementById('range-select').value;
  const sleep = document.getElementById('target-sleep').value || 30;
  const res   = await fetch(`${WORKER_URL}/api/stats?password=${enc(PASSWORD)}&range=${range}&sleep=${sleep}`);
  statsData   = await res.json();

  document.getElementById('header-since').textContent = `${statsData.since} 至今`;

  const t = statsData.totals || {};
  document.getElementById('stat-total').textContent   = t.total   || 0;
  document.getElementById('stat-users').textContent   = t.users   || 0;
  document.getElementById('stat-clients').textContent = t.clients || 0;
  const e8pct = t.total > 0 ? Math.round((t.total_8e||0)*100/t.total) : 0;
  document.getElementById('stat-8e').textContent = e8pct + '%';

  const target = parseInt(document.getElementById('target-visits').value) || 20;
  document.getElementById('avg-badge').textContent = `全行平均：${statsData.avg_visits} 次`;

  renderRadar(statsData.radar, statsData.lastVisit, target);
  renderDailyChart(statsData.dailyTrend);
  renderTypeChart(statsData.typeBreakdown);
  renderPurposeChart(statsData.purposeBreakdown);
  render8EChart(statsData.radar);
  renderSleepingClients(statsData.sleepingClients);
  populateUserFilter(statsData.lastVisit);

  recordsOffset = 0;
  loadRecords();
}

/* ── 管理雷達 ── */
function renderRadar(radar, lastVisit, target) {
  const lastMap = Object.fromEntries((lastVisit||[]).map(r => [r.user_name, r.last_date]));
  const sorted  = [...(radar||[])].sort((a,b) => b.count - a.count);
  const topUser = sorted[0]?.user_name;

  const rows = sorted.map(r => {
    const isTop   = r.user_name === topUser;
    const above   = r.above_avg;
    const countColor = above ? 'color:#16a34a;font-weight:700' : 'color:#dc2626;font-weight:700';
    const momentum   = r.momentum > 0 ? `<span class="text-green-500">↑${r.momentum}</span>`
                     : r.momentum < 0 ? `<span class="text-red-400">↓${Math.abs(r.momentum)}</span>`
                     : `<span class="text-gray-300">—</span>`;
    const pct     = Math.min(100, Math.round(r.count / target * 100));
    const barColor= pct >= 100 ? '#16a34a' : pct >= 60 ? '#f59e0b' : '#ef4444';
    const lastD   = lastMap[r.user_name] || '-';
    const daysSince = lastD !== '-' ? Math.floor((new Date() - new Date(lastD)) / 86400000) : 999;
    const lastTag = daysSince <= 3  ? `<span class="text-green-500 text-xs">${lastD}</span>`
                  : daysSince <= 14 ? `<span class="text-yellow-500 text-xs">${lastD}</span>`
                  :                   `<span class="text-red-400 text-xs">${lastD}</span>`;

    return `<tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">
      <td class="px-4 py-3 font-semibold text-gray-800 whitespace-nowrap">
        ${r.user_name}
        ${isTop ? '<span class="medal ml-1">🏅 最佳</span>' : ''}
      </td>
      <td class="px-4 py-3 text-center">
        <span style="${countColor}">${r.count}</span>
        <span class="text-xs text-gray-400 ml-1">${r.vs_avg >= 0 ? '+' : ''}${r.vs_avg}%</span>
      </td>
      <td class="px-4 py-3 text-center text-[13px]">${momentum}</td>
      <td class="px-4 py-3 text-center">
        <span class="${r.e8_ratio >= 30 ? 'text-green-600' : 'text-gray-500'} font-semibold">${r.e8_ratio}%</span>
        <span class="text-xs text-gray-300 ml-1">(${r.e8_count}次)</span>
      </td>
      <td class="px-4 py-3 text-center text-[13px] text-gray-500">${r.unique_clients} 位</td>
      <td class="px-4 py-3" style="min-width:120px">
        <div class="flex items-center gap-2">
          <div class="progress-bg flex-1">
            <div class="progress-fill" style="width:${pct}%;background:${barColor}"></div>
          </div>
          <span class="text-xs text-gray-500 w-8 text-right">${pct}%</span>
        </div>
      </td>
      <td class="px-4 py-3 text-center">${lastTag}</td>
    </tr>`;
  }).join('');

  document.getElementById('radar-body').innerHTML = rows || '<tr><td colspan="7" class="px-4 py-8 text-center text-gray-400 text-sm">此區間無資料</td></tr>';
}

/* ── 沉睡客戶 ── */
function renderSleepingClients(clients) {
  const list = clients || [];
  document.getElementById('sleep-count').textContent = `共 ${list.length} 位`;
  const html = list.map(c => `
    <div class="flex items-center gap-3 px-5 py-3">
      <div class="w-9 h-9 rounded-xl bg-orange-50 flex items-center justify-center flex-shrink-0">
        <i data-lucide="moon" class="w-4 h-4 text-orange-400"></i>
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-[14px] font-semibold text-gray-800 truncate">${c.client_name}</p>
        <p class="text-[12px] text-gray-400">最後拜訪：${c.last_visit} · 共 ${c.total_visits} 次紀錄</p>
      </div>
      <span class="text-[13px] font-bold text-red-400 flex-shrink-0">${c.days_since} 天未訪</span>
    </div>`).join('');
  document.getElementById('sleep-body').innerHTML = html || '<div class="px-5 py-8 text-center text-gray-400 text-sm">✅ 無沉睡客戶</div>';
}

/* ── 圖表 ── */
function renderDailyChart(trend) {
  redraw('chart-daily', 'line', {
    labels: (trend||[]).map(r => r.visit_date?.slice(5)),
    datasets: [{ label:'拜訪', data: (trend||[]).map(r=>r.count),
      borderColor:'#007d50', backgroundColor:'rgba(0,125,80,0.08)',
      fill:true, tension:0.3, pointRadius:3 }]
  }, { plugins:{legend:{display:false}}, scales:{ y:{beginAtZero:true,ticks:{stepSize:1}}, x:{grid:{display:false}} } });
}

function renderTypeChart(bd) {
  const MAP = { report:'訪談', meeting:'會議', site:'現場' };
  redraw('chart-type', 'doughnut', {
    labels: (bd||[]).map(r => MAP[r.type]||r.type),
    datasets: [{ data:(bd||[]).map(r=>r.count), backgroundColor:['#007d50','#007AFF','#FF9500'], borderWidth:0 }]
  }, { plugins:{legend:{position:'bottom',labels:{font:{size:12}}}}, cutout:'62%' });
}

function renderPurposeChart(bd) {
  redraw('chart-purpose', 'doughnut', {
    labels: (bd||[]).map(r => r.purpose||'未填'),
    datasets: [{ data:(bd||[]).map(r=>r.count), backgroundColor:['#34C759','#FF9500','#007AFF','#FF3B30'], borderWidth:0 }]
  }, { plugins:{legend:{position:'bottom',labels:{font:{size:12}}}}, cutout:'62%' });
}

function render8EChart(radar) {
  redraw('chart-8e', 'bar', {
    labels: (radar||[]).map(r => r.user_name),
    datasets: [
      { label:'8+E', data:(radar||[]).map(r=>r.e8_count), backgroundColor:'rgba(0,125,80,0.8)', borderRadius:5 },
      { label:'一般', data:(radar||[]).map(r=>r.count - r.e8_count), backgroundColor:'rgba(0,125,80,0.15)', borderRadius:5 },
    ]
  }, {
    plugins:{ legend:{ position:'bottom', labels:{ font:{size:12} } } },
    scales:{ x:{ stacked:true, grid:{display:false} }, y:{ stacked:true, beginAtZero:true, ticks:{stepSize:1} } }
  });
}

function redraw(id, type, data, options) {
  if (charts[id]) charts[id].destroy();
  charts[id] = new Chart(document.getElementById(id).getContext('2d'), { type, data, options:{ responsive:true, ...options } });
}

/* ── 明細 ── */
const TYPE_LABEL = { report:'訪談', meeting:'會議', site:'現場' };
const TYPE_CLASS = { report:'badge-report', meeting:'badge-meeting', site:'badge-site' };

async function loadRecords() { recordsOffset=0; recordsSeenKeys.clear(); document.getElementById('records-body').innerHTML=''; await fetchRecords(); }
async function loadMoreRecords() { await fetchRecords(); }
async function fetchRecords() {
  const user = document.getElementById('user-filter').value;
  let url = `${WORKER_URL}/api/records?password=${enc(PASSWORD)}&limit=${RECORDS_LIMIT}&offset=${recordsOffset}`;
  if (user) url += `&user=${enc(user)}`;
  const res  = await fetch(url);
  const data = await res.json();
  const allRows = data.records || [];
  // 去重：同用戶 + 同客戶/會議 + 同日期 + 同類型，只保留第一筆（API 已按 created_at DESC，即最新）
  const rows = allRows.filter(r => {
    const key = `${r.user_name}|${r.type}|${r.client_name||r.meeting_name||''}|${r.visit_date||''}`;
    if (recordsSeenKeys.has(key)) return false;
    recordsSeenKeys.add(key);
    return true;
  });
  rows.forEach(r => { _recordMap[r.id] = r; });
  const html = rows.map(r => `
    <div class="flex items-center gap-3 px-5 py-3 cursor-pointer active:bg-gray-50 hover:bg-gray-50 transition-colors" onclick="showDetail('${r.id}')">
      <span class="badge ${TYPE_CLASS[r.type]||'badge-report'} flex-shrink-0">${TYPE_LABEL[r.type]||r.type}</span>
      <div class="flex-1 min-w-0">
        <p class="text-[14px] font-semibold text-gray-800 truncate">${r.client_name||r.meeting_name||'—'}</p>
        <p class="text-[12px] text-gray-400">${r.user_name} · ${r.visit_date||'-'} · ${r.city||r.branch||'-'}${r.is_8_plus_e ? ' · <span style="color:#007d50;font-weight:600">8+E</span>' : ''}</p>
      </div>
      <span style="color:#d1d5db;font-size:16px;">›</span>
    </div>`).join('');
  document.getElementById('records-body').insertAdjacentHTML('beforeend', html || (recordsOffset===0 ? '<div class="px-5 py-8 text-center text-gray-400 text-sm">此區間無紀錄</div>' : ''));
  recordsOffset += rows.length;
  document.getElementById('records-more').classList.toggle('hidden', rows.length < RECORDS_LIMIT);
  lucide.createIcons();
}

function populateUserFilter(lastVisit) {
  const sel = document.getElementById('user-filter');
  const cur = sel.value;
  sel.innerHTML = '<option value="">全部人員</option>' +
    (lastVisit||[]).map(r => `<option value="${r.user_name}" ${r.user_name===cur?'selected':''}>${r.user_name}</option>`).join('');
}

/* ── 匯出 CSV ── */
async function exportCSV() {
  const range = document.getElementById('range-select').value;
  const url   = `${WORKER_URL}/api/export?password=${enc(PASSWORD)}&range=${range}`;
  const a     = document.createElement('a');
  a.href      = url;
  a.download  = `rm-report.csv`;
  a.click();
}

/* ── 工具 ── */
function enc(s) { return encodeURIComponent(s); }

/* ── 紀錄詳情 ── */
function showDetail(id) {
  const r = _recordMap[id];
  if (!r) return;
  const TYPE_FULL = { report:'访谈报告', meeting:'会议记录', site:'现场记录' };
  const tmpl = (() => { try { return r.tmpl_json ? JSON.parse(r.tmpl_json) : {}; } catch { return {}; } })();

  document.getElementById('detail-title').textContent = r.client_name || r.meeting_name || '—';
  document.getElementById('detail-sub').textContent =
    `${r.user_name} · ${TYPE_FULL[r.type]||r.type} · ${r.visit_date||'-'}`;

  const row = (label, val) => val
    ? `<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f3f4f6;">
         <span style="color:#6b7280;min-width:72px;flex-shrink:0;">${label}</span>
         <span style="color:#111;font-weight:500;">${val}</span>
       </div>`
    : '';
  const section = (title, content) =>
    `<div style="margin-top:14px;">
       <p style="font-size:11px;font-weight:700;color:#9ca3af;letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px;">${title}</p>
       ${content}
     </div>`;
  const block = (val) =>
    `<div style="background:#f9fafb;border-radius:8px;padding:10px 12px;color:#111;white-space:pre-wrap;line-height:1.7;">${val}</div>`;

  let html = '';

  // 基本資訊
  html += section('基本信息',
    row('负责人', r.owner) +
    row('RM组别', r.rm_group) +
    row('访谈目的', r.purpose) +
    row('地点', r.city || r.branch) +
    row('类型/8+E', r.company_type ? `${r.company_type}${r.is_8_plus_e?'（8+E）':''}` : (r.is_8_plus_e?'8+E':'')) +
    row('总行领导', r.hq_leader ? '是' : '') +
    row('参与人员', [r.customer_staff ? '顾客: '+r.customer_staff : '', r.bank_staff ? '我行: '+r.bank_staff : ''].filter(Boolean).join(' / '))
  );

  // 供应链 / 财务
  if (tmpl.group || tmpl.buyer || tmpl.supplier || tmpl.revenue) {
    // 金流圖（買方 ──金流──▶ 客戶 ──金流──▶ 供應商）
    const focalName = r.client_name || r.meeting_name || '—';
    const nodeStyle   = 'display:inline-block;background:#e8f5ee;border:1px solid #b7deca;border-radius:7px;padding:2px 9px;font-size:12px;color:#007d50;font-weight:600;white-space:nowrap;';
    const focalStyle  = 'display:inline-block;background:#007d50;border-radius:7px;padding:3px 10px;font-size:12px;color:#fff;font-weight:700;white-space:nowrap;';
    const arrowStyle  = 'font-size:12px;color:#9ca3af;margin:0 3px;white-space:nowrap;';
    const termsStyle  = 'display:block;font-size:10px;color:#9ca3af;text-align:center;margin-top:2px;';

    let graphHtml = '<div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;padding:10px 4px 6px;">';
    if (tmpl.buyer) {
      graphHtml += `<div style="display:flex;flex-direction:column;align-items:center;">
        <span style="${nodeStyle}">${tmpl.buyer}</span>
        ${tmpl.buyerTerms ? `<span style="${termsStyle}">收款 ${tmpl.buyerTerms}</span>` : ''}
      </div>`;
      graphHtml += `<span style="${arrowStyle}">──金流──▶</span>`;
    }
    graphHtml += `<div style="display:flex;flex-direction:column;align-items:center;">
      <span style="${focalStyle}">${focalName}</span>
      ${tmpl.group ? `<span style="${termsStyle}">${tmpl.group}集团</span>` : ''}
    </div>`;
    if (tmpl.supplier) {
      graphHtml += `<span style="${arrowStyle}">──金流──▶</span>`;
      graphHtml += `<div style="display:flex;flex-direction:column;align-items:center;">
        <span style="${nodeStyle}">${tmpl.supplier}</span>
        ${tmpl.supplierTerms ? `<span style="${termsStyle}">付款 ${tmpl.supplierTerms}</span>` : ''}
      </div>`;
    }
    graphHtml += '</div>';

    html += section('供应链 & 财务',
      graphHtml +
      row('年营收', tmpl.revenue) +
      row('毛利', tmpl.grossMargin) +
      row('员工人数', tmpl.headcount)
    );
  }

  // 現場紀錄 — 訪查內容（site 專用）
  if (r.type === 'site') {
    if (tmpl.mgmtTalk)     html += section('与公司高管面谈情形', block(tmpl.mgmtTalk));
    if (tmpl.factoryEnv)   html += section('访厂情况（产线及库存）', block(tmpl.factoryEnv));
    if (tmpl.businessPerf) html += section('最新接单与营收获利表现', block(tmpl.businessPerf));
    if (tmpl.summary)      html += section('综合评述', block(tmpl.summary));
  }

  // 完整访谈摘要（含第2点之后的 contentList）
  const summaryLines = [];
  if (tmpl.customerNeed) summaryLines.push(`1. ${tmpl.customerNeed}`);
  if (Array.isArray(tmpl.contentList)) {
    tmpl.contentList.filter(i => i && i.trim()).forEach((i, idx) => {
      summaryLines.push(`${idx + 2}. ${i}`);
    });
  }
  if (summaryLines.length) {
    html += section('访谈摘要', block(summaryLines.join('\n')));
  }

  // 待办与后续规划
  const todoLines = Array.isArray(tmpl.todoList)
    ? tmpl.todoList.filter(i => i && i.trim()).map((i, idx) => `${idx + 1}. ${i}`)
    : [];
  if (todoLines.length) {
    html += section('待办与后续规划', block(todoLines.join('\n')));
  }

  // 爭取業務
  const bizList = Array.isArray(tmpl.targetBusiness) ? tmpl.targetBusiness.filter(Boolean) : [];
  if (bizList.length) {
    html += section('争取业务', row('业务项目', bizList.join('、')));
  }

  // 跟进
  if (r.follow_up) {
    html += section('跟进状态', row('跟进', r.follow_up));
  }

  document.getElementById('detail-body').innerHTML = html;
  document.getElementById('detail-modal').classList.remove('hidden');
}

function hideDetail() {
  document.getElementById('detail-modal').classList.add('hidden');
}

  lucide.createIcons();
  const pwd = localStorage.getItem('rm_admin_pwd');
  if (pwd) { document.getElementById('password-input').value = pwd; login(); }
};
